[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Suppress noise from third-party library deprecations
filterwarnings =
    ignore:Using extra keyword arguments on `Field` is deprecated:pydantic.PydanticDeprecatedSince20
    ignore:Parsed a serial number which wasn't positive:cryptography.utils.CryptographyDeprecationWarning
    ignore:Accessing argon2.__version__ is deprecated:DeprecationWarning
